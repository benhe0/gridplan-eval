grid:
  width: 15
  height: 15

spaces:
  open_work_area_1:
    contiguous: true

  meeting_1:
    contiguous: true

  meeting_2:
    contiguous: true

  phone_booth_1:
    contiguous: true

  phone_booth_2:
    contiguous: true

  phone_booth_3:
    contiguous: true

  kitchen_1:
    contiguous: true

  lounge_1:
    contiguous: true

  bathroom_women_1:
    contiguous: true

  bathroom_men_1:
    contiguous: true

  storage_1:
    contiguous: true

  reception_1:
    contiguous: true

  circulation_1:
    min_width: 2
    facade_access: required
    contiguous: false

connectivity:
  # Reception
  - reception_1 door_to circulation_1

  # Open Work Area
  - open_work_area_1 door_to circulation_1
  - open_work_area_1 adjacent_to meeting_1
  - open_work_area_1 adjacent_to meeting_2
  - open_work_area_1 avoid bathroom_men_1
  - open_work_area_1 avoid bathroom_women_1

  # Meeting Rooms (each needs door to circulation)
  - meeting_1 door_to circulation_1
  - meeting_2 door_to circulation_1

  # Phone Booths (each needs door to circulation)
  - phone_booth_1 door_to circulation_1
  - phone_booth_2 door_to circulation_1
  - phone_booth_3 door_to circulation_1

  # Kitchen & Lounge
  - kitchen_1 door_to lounge_1
  - kitchen_1 door_to circulation_1
  - lounge_1 door_to circulation_1

  # Bathrooms
  - bathroom_men_1 adjacent_to bathroom_women_1
  - bathroom_men_1 door_to circulation_1
  - bathroom_women_1 door_to circulation_1

  # Storage
  - storage_1 door_to circulation_1
